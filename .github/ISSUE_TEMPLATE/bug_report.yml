name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: GoldenPipe version
      description: "Run `goldenpipe --version` or `pip show goldenpipe`"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Clear description of the bug"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: "Minimal steps or config to reproduce the issue"
      placeholder: |
        1. Run `goldenpipe run data.csv --config config.yaml`
        2. See error...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config (if applicable)
      description: "Paste your YAML config"
      render: yaml
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: "Full error message or traceback"
      render: shell
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
